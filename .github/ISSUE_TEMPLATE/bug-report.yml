name: 🐛 Bug Report
description: Create a report to help us reproduce and fix the bug
title: "🐛[Bug Report]: "
labels: ["bug"]

body:
- type: markdown
  attributes:
    value: >
      #### Before submitting a bug, please make sure the issue hasn't been already addressed by searching through [the existing and past issues](https://github.com/last9/gpu-telemetry/issues?q=is%3Aissue+sort%3Acreated-desc+).
- type: textarea
  attributes:
    label: 🐛 Describe the bug
    description: |
      Please provide a clear and concise description of what the bug is.

      If relevant, create a minimal repro (See [this](https://stackoverflow.com/help/minimal-reproducible-example) for tips)

      If the code is too long (hopefully, it isn't), feel free to put it in a public gist and link it in the issue: https://gist.github.com.

      Please also paste or describe the results you observe instead of the expected results. If you observe an error, please paste the error message including the **full** traceback of the exception. It may be relevant to wrap error messages in ```` ```triple quotes blocks``` ````.
    placeholder: |
      A clear and concise description of what the bug is.

      ```
      # Sample code to reproduce the problem
      ```

      ```
      The error message you got, with the full traceback.
      ```
  validations:
    required: true
- type: textarea
  attributes:
    label: Describe your installation method
    description: |
      Please provide a clear and concise description of how you're using l9gpu within your system.

      Examples:
        - Using l9gpu via pip install
        - Using l9gpu as a python library
        - Using the Helm chart
  validations:
    required: true
- type: textarea
  attributes:
    label: System information
    description: |
      - l9gpu Version:
      - Operating system:
      - Python version:
      - GPU vendor and model:
      - [Optional] Any other relevant information:
      - [Optional] Please run the following and paste the output below.
        ```
        nvidia-smi  # or hl-smi / amd-smi
        ```

  validations:
    required: true
- type: markdown
  attributes:
    value: >
      Thanks for contributing 🎉!
