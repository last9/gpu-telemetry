# l9gpu nvml_monitor — DaemonSet on all GPU nodes
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: l9gpu-nvml
  namespace: l9gpu-demo-v2
  labels:
    app: l9gpu-nvml
    app.kubernetes.io/part-of: l9gpu-demo-v2
spec:
  selector:
    matchLabels:
      app: l9gpu-nvml
  template:
    metadata:
      labels:
        app: l9gpu-nvml
        app.kubernetes.io/part-of: l9gpu-demo-v2
    spec:
      nodeSelector:
        l9gpu/gpu-type: a10g
      hostPID: true
      containers:
      - name: nvml-monitor
        image: ghcr.io/last9/l9gpu:latest
        command: ["l9gpu", "nvml_monitor"]
        args: ["--sink", "otel", "--cluster", "l9gpu-demo-v2"]
        envFrom:
        - secretRef:
            name: l9gpu-otlp-auth
        resources:
          limits:
            nvidia.com/gpu: 1
---
# vLLM monitor
apiVersion: apps/v1
kind: Deployment
metadata:
  name: l9gpu-vllm-monitor
  namespace: l9gpu-demo-v2
  labels:
    app: l9gpu-vllm-monitor
    app.kubernetes.io/part-of: l9gpu-demo-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: l9gpu-vllm-monitor
  template:
    metadata:
      labels:
        app: l9gpu-vllm-monitor
        app.kubernetes.io/part-of: l9gpu-demo-v2
    spec:
      nodeSelector:
        l9gpu/role: utility
      containers:
      - name: monitor
        image: ghcr.io/last9/l9gpu:latest
        command: ["l9gpu", "vllm_monitor"]
        args:
        - "--sink"
        - "otel"
        - "--cluster"
        - "l9gpu-demo-v2"
        - "--vllm-endpoint"
        - "http://vllm-llama.l9gpu-demo-v2.svc:8000/metrics"
        - "--emit-genai-namespace"
        envFrom:
        - secretRef:
            name: l9gpu-otlp-auth
