<svg width="100%" viewBox="0 0 780 700" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="780" height="700" rx="16" fill="rgb(28,28,28)"/>

<!-- Title -->
<text x="390" y="32" text-anchor="middle" fill="rgb(255,255,255)" font-family="-apple-system, system-ui, sans-serif" font-size="16" font-weight="600">Per-Request GPU Attribution</text>
<text x="390" y="50" text-anchor="middle" fill="rgb(160,160,160)" font-family="-apple-system, system-ui, sans-serif" font-size="11">Map every LLM request to exact GPU time consumed</text>

<!-- Step 1: HTTP Request -->
<rect x="30" y="70" width="200" height="50" rx="10" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="130" y="91" text-anchor="middle" fill="rgb(206,203,246)" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500">HTTP Request</text>
<text x="130" y="108" text-anchor="middle" fill="rgb(175,169,236)" font-family="-apple-system, system-ui, sans-serif" font-size="10">"Explain quantum computing"</text>

<line x1="130" y1="120" x2="130" y2="145" stroke="rgb(175,169,236)" stroke-width="1" marker-end="url(#arr)"/>

<!-- Step 2: vLLM EngineCore -->
<rect x="20" y="148" width="740" height="240" rx="12" fill="rgb(38,38,38)" stroke="rgb(80,80,80)" stroke-width="0.5"/>
<text x="390" y="170" text-anchor="middle" fill="rgb(255,255,255)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600">vLLM EngineCore (patched)</text>

<!-- Batch Step 1 -->
<rect x="40" y="185" width="340" height="85" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="210" y="203" text-anchor="middle" fill="rgb(245,196,179)" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500">Step 42 — Prefill batch</text>
<text x="210" y="220" text-anchor="middle" fill="rgb(240,153,123)" font-family="-apple-system, system-ui, sans-serif" font-size="10">req_A: 512 tokens  |  req_B: 256 tokens</text>
<text x="210" y="237" text-anchor="middle" fill="rgb(240,153,123)" font-family="-apple-system, system-ui, sans-serif" font-size="10">execute_model() = 12.3 ms</text>
<text x="210" y="258" text-anchor="middle" fill="rgb(138,226,138)" font-family="monospace" font-size="10">req_A: 12.3 × 512/768 = 8.2ms</text>

<!-- Batch Step 2 -->
<rect x="400" y="185" width="340" height="85" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="570" y="203" text-anchor="middle" fill="rgb(245,196,179)" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500">Step 43 — Decode batch</text>
<text x="570" y="220" text-anchor="middle" fill="rgb(240,153,123)" font-family="-apple-system, system-ui, sans-serif" font-size="10">req_A: 1 token  |  req_B: 1 token</text>
<text x="570" y="237" text-anchor="middle" fill="rgb(240,153,123)" font-family="-apple-system, system-ui, sans-serif" font-size="10">execute_model() = 3.1 ms</text>
<text x="570" y="258" text-anchor="middle" fill="rgb(138,226,138)" font-family="monospace" font-size="10">req_A: 3.1 × 1/2 = 1.55ms</text>

<!-- Arrow between steps -->
<line x1="380" y1="227" x2="400" y2="227" stroke="rgb(240,153,123)" stroke-width="1" stroke-dasharray="4,3"/>

<!-- Accumulator -->
<rect x="180" y="290" width="420" height="45" rx="8" fill="rgb(30,70,30)" stroke="rgb(138,226,138)" stroke-width="0.5"/>
<text x="390" y="310" text-anchor="middle" fill="rgb(138,226,138)" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500">Ledger accumulates across 128 steps</text>
<text x="390" y="326" text-anchor="middle" fill="rgb(180,240,180)" font-family="monospace" font-size="11">req_A total gpu_time_share = 47.3 ms</text>

<!-- Dots suggesting more steps -->
<text x="390" y="282" text-anchor="middle" fill="rgb(120,120,120)" font-family="-apple-system, system-ui, sans-serif" font-size="14">· · ·  128 decode steps  · · ·</text>

<!-- Arrow down -->
<line x1="390" y1="340" x2="390" y2="355" stroke="rgb(138,226,138)" stroke-width="1"/>

<!-- Step 3: TP Fan-out -->
<rect x="140" y="355" width="500" height="30" rx="6" fill="rgb(50,40,80)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="390" y="375" text-anchor="middle" fill="rgb(206,203,246)" font-family="-apple-system, system-ui, sans-serif" font-size="10">TP=4 → gpu.total_gpu_seconds = 47.3ms × 4 = 189.2ms across all GPUs</text>

<line x1="390" y1="388" x2="390" y2="410" stroke="rgb(175,169,236)" stroke-width="1" marker-end="url(#arr)"/>

<!-- Step 4: OTel Span -->
<rect x="100" y="413" width="580" height="130" rx="10" fill="rgb(40,40,40)" stroke="rgb(100,180,255)" stroke-width="0.8"/>
<text x="390" y="433" text-anchor="middle" fill="rgb(100,180,255)" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600">llm_request span → Last9</text>

<text x="130" y="455" fill="rgb(180,180,180)" font-family="monospace" font-size="10">gen_ai.request.id</text>
<text x="430" y="455" fill="rgb(255,255,255)" font-family="monospace" font-size="10">cmpl-abc123</text>

<text x="130" y="472" fill="rgb(138,226,138)" font-family="monospace" font-size="10" font-weight="bold">gen_ai.usage.gpu_time_share</text>
<text x="430" y="472" fill="rgb(138,226,138)" font-family="monospace" font-size="10" font-weight="bold">0.0473 s</text>

<text x="130" y="489" fill="rgb(138,226,138)" font-family="monospace" font-size="10" font-weight="bold">gpu.total_gpu_seconds</text>
<text x="430" y="489" fill="rgb(138,226,138)" font-family="monospace" font-size="10" font-weight="bold">0.1892 s</text>

<text x="130" y="506" fill="rgb(180,180,180)" font-family="monospace" font-size="10">gpu.tp_size</text>
<text x="430" y="506" fill="rgb(255,255,255)" font-family="monospace" font-size="10">4</text>

<text x="130" y="523" fill="rgb(180,180,180)" font-family="monospace" font-size="10">gpu.uuid</text>
<text x="430" y="523" fill="rgb(255,255,255)" font-family="monospace" font-size="10">GPU-2ff8f7df-8602-...</text>

<text x="130" y="537" fill="rgb(180,180,180)" font-family="monospace" font-size="10">gen_ai.usage.prompt_tokens</text>
<text x="430" y="537" fill="rgb(255,255,255)" font-family="monospace" font-size="10">512</text>

<!-- Arrow down to cost -->
<line x1="390" y1="545" x2="390" y2="570" stroke="rgb(100,180,255)" stroke-width="1" marker-end="url(#arr)"/>

<!-- Step 5: Cost Attribution -->
<rect x="120" y="573" width="540" height="55" rx="10" fill="rgb(80,55,20)" stroke="rgb(255,200,100)" stroke-width="0.5"/>
<text x="390" y="594" text-anchor="middle" fill="rgb(255,220,150)" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500">Post-Processing: Join with DCGM metrics from Prometheus</text>
<text x="390" y="614" text-anchor="middle" fill="rgb(255,200,100)" font-family="monospace" font-size="11">0.0473s × 87% GPU util × $6.88/GPU-hr = $0.000078 per request</text>

<!-- Legend -->
<rect x="30" y="645" width="12" height="12" rx="2" fill="rgb(113,43,19)"/>
<text x="48" y="655" fill="rgb(180,180,180)" font-family="-apple-system, system-ui, sans-serif" font-size="10">vLLM Engine</text>

<rect x="160" y="645" width="12" height="12" rx="2" fill="rgb(30,70,30)"/>
<text x="178" y="655" fill="rgb(180,180,180)" font-family="-apple-system, system-ui, sans-serif" font-size="10">GPU Time Ledger</text>

<rect x="300" y="645" width="12" height="12" rx="2" fill="rgb(40,40,40)" stroke="rgb(100,180,255)" stroke-width="0.5"/>
<text x="318" y="655" fill="rgb(180,180,180)" font-family="-apple-system, system-ui, sans-serif" font-size="10">OTel Span</text>

<rect x="410" y="645" width="12" height="12" rx="2" fill="rgb(80,55,20)"/>
<text x="428" y="655" fill="rgb(180,180,180)" font-family="-apple-system, system-ui, sans-serif" font-size="10">Cost Attribution</text>

<rect x="560" y="645" width="12" height="12" rx="2" fill="rgb(50,40,80)"/>
<text x="578" y="655" fill="rgb(180,180,180)" font-family="-apple-system, system-ui, sans-serif" font-size="10">Multi-GPU (TP)</text>

<!-- NEW badge -->
<rect x="660" y="460" width="36" height="16" rx="4" fill="rgb(138,226,138)"/>
<text x="678" y="472" text-anchor="middle" fill="rgb(28,28,28)" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="700">NEW</text>

<rect x="660" y="477" width="36" height="16" rx="4" fill="rgb(138,226,138)"/>
<text x="678" y="489" text-anchor="middle" fill="rgb(28,28,28)" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="700">NEW</text>

</svg>
