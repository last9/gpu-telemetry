<svg width="100%" viewBox="0 0 720 600" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="720" height="600" rx="16" fill="rgb(28,28,28)"/>

<!-- GPU Node outer container -->
<rect x="30" y="30" width="660" height="460" rx="14" fill="rgb(34,34,34)" stroke="rgb(110,110,110)" stroke-width="0.6"/>
<text x="48" y="56" fill="rgb(200,200,200)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500">GPU Node</text>
<text x="112" y="56" fill="rgb(140,140,140)" font-family="-apple-system, system-ui, sans-serif" font-size="11">e.g. p5.48xlarge · 8× H100</text>
<text x="672" y="56" text-anchor="end" fill="rgb(140,140,140)" font-family="-apple-system, system-ui, sans-serif" font-size="10">kubelet</text>

<!-- l9gpu DaemonSet Pod -->
<rect x="60" y="78" width="360" height="92" rx="10" fill="rgb(30,45,30)" stroke="rgb(106,170,106)" stroke-width="0.6"/>
<text x="76" y="100" fill="rgb(176,218,176)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500">l9gpu DaemonSet Pod</text>
<text x="76" y="120" fill="rgb(106,170,106)" font-family="-apple-system, system-ui, sans-serif" font-size="11">nvml_monitor · amd_monitor · gaudi_monitor</text>
<text x="76" y="138" fill="rgb(106,170,106)" font-family="-apple-system, system-ui, sans-serif" font-size="11">fleet_health_monitor · cost_monitor</text>
<text x="76" y="156" fill="rgb(130,150,130)" font-family="-apple-system, system-ui, sans-serif" font-size="10">reads NVML / DCGM / amdsmi on host</text>
<text x="452" y="120" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">hostPID + /dev/nvidia*</text>
<text x="452" y="138" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">nvidia.com/gpu: 1</text>

<!-- Arrow: DaemonSet → Collector -->
<line x1="240" y1="170" x2="240" y2="206" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="252" y="192" fill="rgb(194,192,182)" font-family="-apple-system, system-ui, sans-serif" font-size="10">OTLP</text>

<!-- OTel Collector Pod -->
<rect x="60" y="210" width="500" height="100" rx="10" fill="rgb(12,68,124)" stroke="rgb(133,183,235)" stroke-width="0.6"/>
<text x="76" y="232" fill="rgb(181,212,244)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500">OTel Collector DaemonSet Pod</text>
<text x="76" y="252" fill="rgb(133,183,235)" font-family="-apple-system, system-ui, sans-serif" font-size="11">+ k8sprocessor    GPU ↔ pod / workload / cloud attribution</text>
<text x="76" y="270" fill="rgb(133,183,235)" font-family="-apple-system, system-ui, sans-serif" font-size="11">+ hostmetrics      host CPU, memory, disk</text>
<text x="76" y="288" fill="rgb(133,183,235)" font-family="-apple-system, system-ui, sans-serif" font-size="11">+ kubeletstats     per-container resource usage</text>
<text x="76" y="306" fill="rgb(133,183,235)" font-family="-apple-system, system-ui, sans-serif" font-size="11">+ prometheus/dcgm  scrape dcgm-exporter</text>

<!-- Arrow: Inference → Collector (prom scrape) -->
<path d="M 330 340 Q 330 330 330 320" fill="none" stroke="rgb(156,154,146)" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr)"/>
<text x="340" y="332" fill="rgb(194,192,182)" font-family="-apple-system, system-ui, sans-serif" font-size="10">Prom scrape</text>

<!-- Inference Pod -->
<rect x="60" y="340" width="500" height="88" rx="10" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.6"/>
<text x="76" y="362" fill="rgb(206,203,246)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500">Inference Pod</text>
<text x="76" y="381" fill="rgb(175,169,236)" font-family="-apple-system, system-ui, sans-serif" font-size="11">vLLM · SGLang · TGI · Triton · NIM</text>
<text x="76" y="399" fill="rgb(175,169,236)" font-family="-apple-system, system-ui, sans-serif" font-size="11">:8000/metrics  →  vllm_monitor  or  OTel prom receiver</text>
<text x="76" y="417" fill="rgb(140,138,178)" font-family="-apple-system, system-ui, sans-serif" font-size="10">token throughput · queue depth · KV cache usage · TTFT / ITL</text>

<!-- Arrow annotations on the right side -->
<text x="578" y="125" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">collects</text>
<text x="578" y="139" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">L1 GPU</text>
<text x="578" y="258" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">enriches</text>
<text x="578" y="272" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">L3 + L4</text>
<text x="578" y="380" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">L6</text>
<text x="578" y="394" fill="rgb(150,150,150)" font-family="-apple-system, system-ui, sans-serif" font-size="10">inference</text>

<!-- Arrow from Collector down through node boundary -->
<line x1="310" y1="440" x2="310" y2="506" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="322" y="478" fill="rgb(194,192,182)" font-family="-apple-system, system-ui, sans-serif" font-size="10">OTLP HTTP (gzip + retry)</text>

<!-- Backend box -->
<rect x="180" y="510" width="360" height="60" rx="10" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.6"/>
<text x="360" y="534" text-anchor="middle" fill="rgb(211,209,199)" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500">Your OTLP backend</text>
<text x="360" y="552" text-anchor="middle" fill="rgb(180,178,169)" font-family="-apple-system, system-ui, sans-serif" font-size="11">any OTLP-compatible metrics / logs / traces sink</text>

<text x="360" y="586" text-anchor="middle" fill="rgb(100,98,90)" font-family="-apple-system, system-ui, sans-serif" font-size="10">RBAC: pods, nodes, replicasets · list / watch / get</text>
</svg>
